<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="room-header">
        <h3>Rooms</h3>
        <input id="new-room" type="text" placeholder="Join room..." aria-label="Join room">
      </div>
      <ul id="room-list"></ul>
      <div id="user-header"><h3>Users</h3></div>
      <ul id="user-list"></ul>
    </aside>
    <main id="chat">
      <div id="chat-header"><span id="current-room">#general</span></div>
      <div id="messages" role="log" aria-live="polite"></div>
      <div id="typing" aria-live="polite"></div>
      <form id="form">
        <button type="button" id="emoji-btn" aria-label="Emoji picker">😊</button>
        <div id="emoji-picker" hidden></div>
        <input id="input" type="text" placeholder="Type a message... (/join #room)" autocomplete="off" aria-label="Message input">
        <button type="submit">Send</button>
      </form>
    </main>
  </div>
  <script src="/js/chat.js"></script>
  <script src="/js/emoji.js"></script>
</body>
</html>
